name: UnicodeShortcodes
version: ${version}
main: dev.copilot.unicode.UnicodeShortcodesPlugin
api-version: '1.21'
description: Converts colon shortcodes in chat into emoji glyphs
authors:
  - UnicodeTools
commands:
  unicodeemoji:
    description: Reloads emoji shortcodes and manages the emoji resource pack
    usage: /unicodeemoji <reload|pack>
    permission: unicodeemoji.reload
permissions:
  unicodeemoji.reload:
    description: Allows reloading emoji shortcodes from config.yml
    default: op
  unicodeemoji.pack:
    description: Allows sending the bundled emoji resource pack to players
    default: op
