name: MarketMC
version: ${version}
main: com.marketmc.MarketMCPlugin
api-version: 1.21.1
authors: ["MarketMC Team"]
depend: [Vault]
softdepend: [PlaceholderAPI, Essentials]
commands:
  company:
    description: Root command for company actions
    usage: /company <create|info|buy|sellshares|sell|list|buycompany|buyout>
    aliases: [comp, corp]
  portfolio:
    description: Shows your holdings and cooldowns
    usage: /portfolio
  marketmc:
    description: Admin utilities for MarketMC
    usage: /marketmc <reload|gui|sus|apikey|analytics|sandbox>
  market:
    description: Opens the MarketMC interface
    usage: /market [page]
    permission: marketmc.market.gui
  learnthemarket:
    description: Opens the Learn the Market handbook
    usage: /learnthemarket
    permission: marketmc.learn
permissions:
  marketmc.admin:
    description: Access to admin tools
    default: op
  marketmc.admin.reload:
    description: Allows /marketmc reload
    default: op
  marketmc.admin.gui:
    description: Allows opening the admin GUI
    default: op
  marketmc.admin.sus:
    description: Allows viewing the Market SUS board
    default: op
  marketmc.admin.analytics:
    description: Allows managing the analytics API service
    default: op
  marketmc.admin.apikey:
    description: Allows creating and revoking analytics API keys
    default: op
  marketmc.admin.sandbox:
    description: Allows running sandbox simulations
    default: op
  marketmc.company.create:
    description: Allows company creation
    default: true
  marketmc.company.info:
    description: Allows viewing company info via /company info
    default: true
  marketmc.company.list:
    description: Allows listing companies via /company list
    default: true
  marketmc.company.buy:
    description: Allows buying company shares
    default: true
  marketmc.company.sell:
    description: Allows selling company shares
    default: true
  marketmc.company.trade:
    description: Legacy trading broadcast permission
    default: true
  marketmc.company.store:
    description: Allows listing company store items
    default: true
  marketmc.company.store.manage:
    description: Allows managing company stores regardless of ownership
    default: op
  marketmc.company.treasury:
    description: Allows withdrawing from company treasuries regardless of ownership
    default: op
  marketmc.company.marketing:
    description: Allows launching marketing campaigns regardless of ownership
    default: op
  marketmc.company.acquire:
    description: Allows purchasing entire companies at a buyout price
    default: false
  marketmc.company.buyout.set:
    description: Allows configuring company buyout pricing regardless of ownership
    default: op
  marketmc.market.gui:
    description: Allows opening the player market GUI
    default: true
  marketmc.portfolio.view:
    description: Allows viewing your portfolio
    default: true
  marketmc.learn:
    description: Allows using /learnthemarket
    default: true
