database:
  type: MYSQL # MYSQL, MONGODB, or FILE
  mysql:
    host: localhost
    port: 3306
    database: marketmc
    username: root
    password: changeme
    pool:
      maximumPoolSize: 10
      minimumIdle: 2
  mongodb:
    connectionString: mongodb://localhost:27017
    database: marketmc
  file:
    directory: storage
vault:
  currencySymbol: $

companies:
  creationCost: 100000.0
  ipoFeePercent: 0.03
  listingCooldownMinutes: 60
  defaultShares: 10000
  defaultSharePrice: 10.0
  defaultBuyoutPrice: 0.0
  allowedSectors:
    - mining
    - farming
    - armory
    - other

trading:
  tickIntervalSeconds: 30
  volatilityMultiplier: 0.5
  maxPriceMovePercent: 0.05
  baseTaxPercent: 0.02
  progressiveTaxThresholdPercent: 0.05
  progressiveTaxExtraPercent: 0.02
  perPlayerDailyLimitPercent: 0.05
  perPlayerDailyLimitShares: 10000
  holdingPeriodSeconds: 600
  tradeCooldownSeconds: 30
  buySellCooldownSeconds: 120

market:
  macro:
    inflationBase: 0.012
    liquidityBase: 0.018
    growthBase: 0.01
    volatilityFloor: 0.15
    noiseStrength: 0.2
  shocks:
    supplyShockChance: 0.12
    demandShockChance: 0.1
    maxShockPercent: 0.06
    sectorCorrelation: 0.45
  priceHistoryWindow: 12
  sentiment:
    min: -0.5
    max: 0.6
    wobbleSeconds: 120

antiExploit:
  rapidTradeThresholdSeconds: 10
  rapidTradeMaxPerWindow: 4
  maxSharesPerMinutePercent: 0.12
  suspiciousProfitPercent: 0.25
  flagDecayMinutes: 60
  severityWeights:
    rapid: 0.4
    volume: 0.35
    profit: 0.25

economy:
  startingBalance: 500000.0
  maxBoostPercent: 0.04
  boostCooldownSeconds: 900
  treasurySupportPercent: 0.02
  storeKickbackPercent: 0.015

store:
  revenueWeight: 0.5
  listingFee: 500.0
  upkeepPerDay: 100.0
  saleAnnouncementCost: 10000.0
  saleMaxPercent: 0.75

marketing:
  enabled: true
  minSpend: 5000.0
  maxSpend: 250000.0
  durationMinutes: 45
  boostPerThousand: 0.0015

analytics:
  enabled: false
  bindAddress: 127.0.0.1
  port: 8913
  requireKey: true

sandbox:
  enabled: true
  maxDurationMinutes: 15
  tickAcceleration: 4

achievements:
  enabled: true
  definitions:
    mogul:
      name: "&6Market Mogul"
      description: "Own a company worth $5,000,000"
      trigger: COMPANY_MARKET_CAP
      threshold: 5000000
    whale:
      name: "&bShare Whale"
      description: "Trade 500 total shares"
      trigger: SHARES_TRADED
      threshold: 500
    rainmaker:
      name: "&aRainmaker"
      description: "Purchase 250 store items"
      trigger: STORE_PURCHASES
      threshold: 250
    influencer:
      name: "&dInfluencer"
      description: "Spend $50,000 on marketing"
      trigger: MARKETING_SPEND
      threshold: 50000

sinks:
  eventPenaltyPercent: 0.01
  dividendTaxPercent: 0.05

events:
  minIntervalMinutes: 180
  maxIntervalMinutes: 420
  durationMinutes: 45
  definitions:
    war:
      description: War tensions hit tech + mining
      multiplier: 0.95
      sectors: [tech, mining]
    ceasefire:
      description: Peace talks calm tech + mining
      multiplier: 1.04
      sectors: [tech, mining]
    economic_boom:
      description: Economic boom lifts all markets
      multiplier: 1.03
      sectors: ["*"]
    recession:
      description: Market wide recession fears
      multiplier: 0.97
      sectors: ["*"]
    farming_subsidy:
      description: Government boosts agriculture
      multiplier: 1.07
      sectors: [farming]
    drought:
      description: Drought cripples crop output
      multiplier: 0.94
      sectors: [farming]
    tech_breakthrough:
      description: Breakthrough innovation surges tech
      multiplier: 1.06
      sectors: [tech]
    security_breach:
      description: Major security breach shakes tech
      multiplier: 0.93
      sectors: [tech]
    mining_strike:
      description: Miner strike halts production
      multiplier: 0.94
      sectors: [mining]
    rare_vein_discovery:
      description: New ore vein excites mining firms
      multiplier: 1.05
      sectors: [mining]
    refinery_fire:
      description: Refinery fire spikes energy costs
      multiplier: 0.92
      sectors: [energy]
    energy_spike:
      description: Global demand spikes energy profits
      multiplier: 1.05
      sectors: [energy]
    retail_craze:
      description: Shopping craze boosts retail
      multiplier: 1.06
      sectors: [retail, hospitality]
    consumer_slump:
      description: Consumer slump hurts retail
      multiplier: 0.95
      sectors: [retail, hospitality]
    logistics_meltdown:
      description: Port congestion hammers logistics
      multiplier: 0.94
      sectors: [logistics, industrial]
    infrastructure_bill:
      description: Infrastructure bill lifts industry
      multiplier: 1.05
      sectors: [industrial, logistics]
    biotech_trial_success:
      description: Biotech trial success thrills investors
      multiplier: 1.08
      sectors: [biotech]
    biotech_trial_failure:
      description: Biotech trial failure spooks investors
      multiplier: 0.9
      sectors: [biotech]
    scandal:
      description: Random company scandal
      multiplier: 0.9
      sectors: [random]
    government_contract:
      description: Random company wins huge contract
      multiplier: 1.08
      sectors: [random]

gui:
  marketOverviewTitle: "&6Market Pulse"
  companyDetailTitle: "&9Company Brief"
  storeTitle: "&eCompany Storefront"
  adminTitle: "&cEconomy Controls"
  susTitle: "&4Market SUS Board"
  portfolioTitle: "&aHoldings"
